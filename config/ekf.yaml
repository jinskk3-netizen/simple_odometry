ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Источник 1: Колесная одометрия из вашего пакета simple_odometry
    odom0: /odom_wheel
    odom0_config: [true,  true,  false,   # X, Y, Z
                   false, false, true,    # Roll, Pitch, Yaw
                   true,  true,  false,   # Vx, Vy, Vz
                   false, false, true,    # Vroll, Vpitch, Vyaw
                   false, false, false]   # Ax, Ay, Az
    odom0_differential: false

    # Источник 2: Лидарная одометрия (от rf2o)
    odom1: /odom_lidar
    odom1_config: [true,  true,  false,   # X, Y, Z
                   false, false, true,    # Roll, Pitch, Yaw
                   true,  true,  false,   # Vx, Vy, Vz
                   false, false, true,    # Vroll, Vpitch, Vyaw
                   false, false, false]
    odom1_differential: true # Рекомендуется true для лидара, чтобы избежать конфликта абсолютных координат
